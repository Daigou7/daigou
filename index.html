<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daigou</title>

<link rel="icon" type="image/png" href="https://imgur.com/sx5COrj.png">

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

:root{
    --bg:url('https://imgur.com/ZKHnd3X.png');
    --pfp:url('https://imgur.com/1ptZA7W.png');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#000;
    min-height:100vh;
    display:grid;
    place-items:center;
    padding:20px;
    overflow-x:hidden;
    color:#fff;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:var(--bg) center center/cover no-repeat;
    opacity:.65;
    pointer-events:none;
    z-index:-1;
}

body::after{
    content:'';
    position:fixed;
    right:20px;
    bottom:20px;
    width:220px;
    height:120px;
    background:url('https://i.imgur.com/1BWj7aN.gif') center/contain no-repeat;
    pointer-events:none;
    z-index:1;
    opacity:.95;
}

/* CARD INVISÍVEL */

.card{
    width:430px;

    background:transparent;
    border:none;
    border-radius:0;

    overflow:visible;
    position:relative;

    backdrop-filter:none;
    -webkit-backdrop-filter:none;

    box-shadow:none;
}

.banner{
    height:0;
}

/* FOTO */

.pfp{
    width:110px;
    height:110px;

    border-radius:50%;
    border:2px solid #000;

    background:var(--pfp) center/cover;

    margin:0 auto;

    box-shadow:
    0 0 0 2px #000,
    0 0 20px rgba(0,0,0,.6);
}

.content{
    padding:24px 30px 35px;
    text-align:center;
}

/* TEXTO */

h1{
    font-size:30px;
    font-weight:700;
    letter-spacing:3px;
    text-transform:uppercase;
    color:#fff;

    text-shadow:
    2px 2px 0 #000,
   -2px 2px 0 #000,
    2px -2px 0 #000,
   -2px -2px 0 #000;
}

.bio{
    margin-top:14px;
    font-size:14px;
    line-height:1.8;
    color:#fff;

    text-shadow:
    1px 1px 0 #000,
   -1px 1px 0 #000,
    1px -1px 0 #000,
   -1px -1px 0 #000;
}

/* LINKS */

.links{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-top:30px;
}

.btn{
    flex:1;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;

    padding:13px;

    background:transparent;

    border:2px solid #000;
    border-radius:14px;

    text-decoration:none;
    color:#fff;

    font-size:13px;
    font-weight:600;

    transition:.2s;

    text-shadow:
    1px 1px 0 #000,
   -1px 1px 0 #000,
    1px -1px 0 #000,
   -1px -1px 0 #000;
}

.btn:hover{
    transform:translateY(-2px);

    box-shadow:
    0 0 10px rgba(0,0,0,.8);
}

.btn img{
    width:22px;
    height:22px;
    object-fit:contain;

    filter:
    drop-shadow(1px 1px 0 #000)
    drop-shadow(-1px -1px 0 #000);
}

@media(max-width:500px){

    .card{
        width:100%;
    }

    .links{
        flex-direction:column;
    }

    .btn{
        width:100%;
    }

}

</style>
</head>
<body>

<div class="card">

    <div class="banner"></div>

    <div class="pfp"></div>

    <div class="content">

        <h1>DAIGOU</h1>

        <div class="bio">
            Jesus Christ is Lord ♱<br>
            Buy Bitcoin ₿
        </div>

        <div class="links">

            <a class="btn" href="https://www.blockchain.com/explorer/addresses/btc/bc1qxy0uvk6n9fu7nv9a93ljax8q77vl649pmsh8ws" target="_blank">
                <img src="https://i.imgur.com/dvR0GB6.png">
                <span>Bitcoin</span>
            </a>

            <a class="btn" href="https://steamcommunity.com/id/Daigou7/" target="_blank">
                <img src="https://i.imgur.com/N92w6JN.png">
                <span>Steam</span>
            </a>

            <a class="btn" href="https://myanimelist.net/profile/daigou" target="_blank">
                <img src="https://i.imgur.com/jWbk2Ey.png">
                <span>MAL</span>
            </a>

        </div>

    </div>

</div>

</body>
</html>
