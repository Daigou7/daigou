<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daigou</title>
    <link rel="icon" type="image/png" href="https://imgur.com/7H8pFGh.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Fira-Code:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#050505;
            --text:#d6d6d6;
            --muted:#9a9a9a;
        }
        *{ margin:0; padding:0; box-sizing:border-box; }
        body,html{ height:100%; overflow:hidden; font-family:'Fira Code',monospace; color:var(--text); 
            background: 
                radial-gradient(circle at 20% 20%, rgba(255,255,255,.04), transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,.03), transparent 50%),
                linear-gradient(135deg, #0a0a0a, #000);
        }
        body::before{ 
            content:''; position:fixed; inset:0; 
            background:repeating-linear-gradient( to bottom, transparent, transparent 4px, rgba(255,255,255,.02) 5px ); 
            pointer-events:none; 
            z-index: -1;
        }

        .container{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); }
        .card{ 
            background:rgba(0,0,0,0.6); 
            border:1px solid rgba(255,255,255,.08); 
            padding:0; 
            border-radius:14px; 
            width:340px; 
            text-align:center; 
            overflow:hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* BANNER */
        .banner {
            position: relative;
            width: 100%;
            height: 160px;
            background: url('https://imgur.com/hj11RAb.png') center/cover no-repeat;
            border-radius: 14px 14px 0 0;
        }

        .avatar {
            width: 118px;
            height: 118px;
            border-radius: 50%;
            border: 5px solid var(--bg);
            position: absolute;
            bottom: -58px;
            left: 50%;
            transform: translateX(-50%);
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
            z-index: 2;
        }

        .name{ font-size:32px; letter-spacing:3px; color:var(--text); font-weight:700; margin-top: 55px; }
        .bio{ font-size:12px; margin:12px 0 18px; color:var(--muted); line-height:1.4; }
        .btc{ 
            font-size:10px; 
            padding:12px; 
            margin:0 20px 16px; 
            border:1px dashed rgba(255,255,255,.15); 
            border-radius:8px; 
            cursor:pointer; 
            word-break:break-all; 
            color:var(--text);
            transition: .2s;
        }
        .btc:hover{ border-color: rgba(255,255,255,.4); background:rgba(255,255,255,.03); }

        .link{ 
            display:flex; align-items:center; gap:10px; 
            margin:0 20px 20px; 
            padding:12px; 
            background:rgba(0,0,0,.5); 
            border-radius:8px; 
            border:1px solid rgba(255,255,255,.08); 
            text-decoration:none; 
            color:var(--text); 
            font-size:12px; 
            transition:.2s;
        }
        .link:hover{ transform:translateX(6px); border-color:rgba(255,255,255,.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="banner"></div>
            <img id="avatar" class="avatar" src="">
            <div class="name">DAIGOU</div>
            <div class="bio"> Jᴇsᴜs Cʜʀɪsᴛ is Lord ♱<br> Buy Bitcoin ₿ </div>
            <div id="btc" class="btc"> bc1qxy0uvk6n9fu7nv9a93ljax8q77vl649pmsh8ws </div>
            <a class="link" href="https://steamcommunity.com/id/Daigou7/" target="_blank">
                <img src="https://imgur.com/N92w6JN.png" width="18"> Steam
            </a>
        </div>
    </div>

    <script>
        // Avatar Steam
        document.getElementById("avatar").src = "https://avatars.steamstatic.com/0f0f0f0f0f0f0f0f0f0f0f0f0f0f0f0f_full.jpg";
        
        document.getElementById("btc").addEventListener("click", function(){
            navigator.clipboard.writeText(this.textContent.trim());
            this.style.borderColor = "#00ff00";
            setTimeout(() => this.style.borderColor = "", 800);
        });
    </script>
</body>
</html>
