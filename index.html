<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daigou</title>
    <link rel="icon" type="image/png" href="https://imgur.com/LFnzu3x.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-light: #ffb7c5;
            --win-bg: rgba(15, 15, 15, 0.85);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Fira Code', monospace;
            /* Fundo gradient preto animado (substituindo a imagem anterior) */
            background: linear-gradient(270deg, #0a0a0a, #1a1a1a, #0a0a0a, #111111);
            background-size: 400% 400%;
            animation: gradientShift 18s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .sidebar-container {
            position: fixed;
            left: 50%;
            top: 30px;
            transform: translateX(-50%);
            width: 300px;
            z-index: 1000;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        .side-card {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://imgur.com/9wcKnLi.gif') no-repeat center/cover;
            backdrop-filter: blur(5px);
            border: 1px solid var(--pink-light);
            padding: 25px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .avatar { 
            width: 90px; 
            height: 90px; 
            border: 1px solid var(--pink-light); 
            margin-bottom: 12px; 
            object-fit: cover; 
        }

        .bio { 
            font-family: 'Quicksand', sans-serif; 
            font-size: 13px; 
            color: #fff; 
            line-height: 1.5; 
            text-shadow: 1px 1px 2px #000;
            margin-bottom: 20px;
        }

        /* Nova seção do endereço Bitcoin */
        .btc-address-container {
            margin-bottom: 22px;
        }

        .btc-label {
            font-size: 10px;
            color: #ffd700;
            font-family: 'Fira Code', monospace;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .btc-address {
            display: block;
            font-size: 10px;
            font-family: 'Fira Code', monospace;
            color: #fff;
            background: rgba(0, 0, 0, 0.45);
            border: 1px dashed rgba(255, 215, 0, 0.4);
            padding: 10px 12px;
            border-radius: 6px;
            word-break: break-all;
            line-height: 1.3;
            cursor: pointer;
            transition: all 0.2s ease;
            text-shadow: 0 0 6px rgba(255, 215, 0, 0.3);
        }

        .btc-address:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: #ffd700;
            transform: translateY(-1px);
        }

        /* Lista de Links */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            padding: 10px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 183, 197, 0.2);
            transition: 0.3s;
        }

        .link-item:hover {
            background: rgba(255, 183, 197, 0.15);
            border-color: var(--pink-light);
            transform: translateX(8px);
        }

        .link-icon {
            width: 18px;
            height: 18px;
            object-fit: contain;
        }

        .link-label {
            color: var(--pink-light);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="sidebar-container">
        <div class="side-card">
            <img src="https://imgur.com/joCPvDu.gif" class="avatar">
            
            <div class="bio">
                Jᴇsᴜs Cʜʀɪsᴛ is Lord ♱<br>
                ʙᴜʏ ʙɪᴛᴄᴏɪɴ ₿
            </div>
            <div class="btc-address-container">
                <span id="btc-address" class="btc-address">
                    bc1qxy0uvk6n9fu7nv9a93ljax8q77vl649pmsh8ws
                </span>
            </div>

            <div class="links-list">
                <a href="https://www.youtube.com/channel/UCfYSU1O3I72mrDHCRNUPtNQ" target="_blank" class="link-item">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" class="link-icon">
                    <span class="link-label">YouTube</span>
                </a>

                <a href="https://steamcommunity.com/id/Daigou7/" target="_blank" class="link-item">
                    <img src="https://imgur.com/N92w6JN.png" class="link-icon">
                    <span class="link-label">Steam</span>
                </a>

                <a href="https://myanimelist.net/profile/Daigou" target="_blank" class="link-item">
                    <img src="https://imgur.com/jWbk2Ey.png" class="link-icon">
                    <span class="link-label">MyAnimeList</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        // Copia silenciosa (sem notificação, sem alert, sem toast)
        document.addEventListener('DOMContentLoaded', () => {
            const addressEl = document.getElementById('btc-address');
            
            if (addressEl) {
                addressEl.addEventListener('click', () => {
                    const address = addressEl.textContent.trim();
                    navigator.clipboard.writeText(address).catch(() => {
                        // Falha silenciosa (nada aparece pro usuário)
                    });
                });
            }
        });
    </script>

</body>
</html>
