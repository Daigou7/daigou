<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daigou</title>
    <link rel="icon" type="image/png" href="https://imgur.com/LFnzu3x.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root{--pink:#ffb7c5}
        *{margin:0;padding:0;box-sizing:border-box}
        body,html{width:100%;height:100%;font-family:'Fira Code',monospace;background:linear-gradient(135deg,#0a0a0a,#1a1a1a,#0a0a0a),repeating-linear-gradient(45deg,transparent,transparent 50px,rgba(0,255,80,.025)50px,rgba(0,255,80,.025)52px);background-size:400% 400%,120px 120px;animation:grad 35s linear infinite;overflow:hidden}
        @keyframes grad{0%{background-position:0% 50%,0 0}50%{background-position:100% 50%,120px 120px}100%{background-position:0% 50%,0 0}}
        body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,rgba(0,255,100,.015)3px,rgba(0,255,100,.015)4px);animation:scan 8s linear infinite;pointer-events:none;z-index:-1}
        @keyframes scan{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}
        
        .container{position:fixed;left:50%;top:30px;transform:translateX(-50%);width:fit-content;z-index:1000}
        .card{background:rgba(8,8,8,.48);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.07);padding:28px 24px;text-align:center;border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,.9);width:fit-content;min-width:320px;max-width:360px;position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;inset:-2px;border-radius:18px;background:linear-gradient(90deg,transparent,rgba(0,255,100,.15),transparent);animation:border 4s linear infinite;z-index:-1}
        @keyframes border{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}
        
        .name{font-family:Arial Black,sans-serif;font-size:34px;font-weight:900;letter-spacing:3px;color:var(--pink);margin-bottom:8px;text-shadow:0 0 12px rgba(255,183,197,.6)}
        .bio{font-family:'Quicksand',sans-serif;font-size:13px;line-height:1.6;color:#eee;margin-bottom:24px}
        
        .btc{margin:0 auto 22px;width:fit-content}
        .btcaddr{font-size:9.5px;background:rgba(15,15,15,.75);border:1px dashed rgba(255,215,0,.4);padding:11px 14px;border-radius:8px;color:#eee;cursor:pointer;transition:.3s;word-break:break-all;max-width:280px}
        .btcaddr:hover{background:rgba(255,215,0,.15);border-color:#ffd700;transform:translateY(-2px);box-shadow:0 0 15px rgba(255,215,0,.3)}
        
        .links{max-width:300px;margin:0 auto;display:flex;flex-direction:column;gap:9px}
        .link{display:flex;align-items:center;gap:12px;padding:11px 12px;background:rgba(15,15,15,.65);border:1px solid rgba(255,183,197,.12);border-radius:8px;color:#eee;text-decoration:none;font-size:12px;transition:.35s}
        .link:hover{background:rgba(255,183,197,.12);border-color:var(--pink);transform:translateX(8px)}
        .link img{width:18px;height:18px;transition:.3s}
        .link:hover img{transform:scale(1.15)}
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="name">DAIGOU</div>
            <div class="bio">Jᴇsᴜs Cʜʀɪsᴛ is Lord ♱<br>ʙᴜʏ ʙɪᴛᴄᴏɪɴ ₿</div>
            
            <div class="btc">
                <span id="btc" class="btcaddr">bc1qxy0uvk6n9fu7nv9a93ljax8q77vl649pmsh8ws</span>
            </div>
            
            <div class="links">
                <a href="https://steamcommunity.com/id/Daigou7/" target="_blank" class="link">
                    <img src="https://imgur.com/N92w6JN.png"> 
                    <span>Steam</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('btc').addEventListener('click',()=>{navigator.clipboard.writeText(this.textContent.trim())});
    </script>
</body>
</html>
