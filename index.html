<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>Daigou</title>

<style>
:root{
--banner:url(https://i.imgur.com/gmyRB35.png);
--pfp:url(https://i.imgur.com/NkAbsLy.png);
--pink:#ff5fd2;
--purple:#9d6bff;
--cyan:#69e8ff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:flex-start;
padding-left:8vw;
background:#000;
color:#fff;
overflow-x:hidden;
}

#bg{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
pointer-events:none;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
z-index:-1;
}

body::after{
content:"";
position:fixed;
right:60px;
bottom:25px;
width:260px;
height:260px;
background:url(https://media.tenor.com/3iZPSvYxecMAAAAj/mita-chibi-mita.gif) center/contain no-repeat;
z-index:5;
pointer-events:none;
}

.card{
width:470px;
border-radius:28px;
overflow:hidden;
position:relative;
border:1px solid rgba(255,255,255,.05);
background:linear-gradient(180deg,rgba(18,18,18,.98),rgba(6,6,6,.98));
box-shadow:0 0 50px rgba(0,0,0,.85);
backdrop-filter:blur(20px);
}

.card:before{
content:"";
position:absolute;
inset:-2px;
background:linear-gradient(135deg,var(--pink),var(--cyan),var(--purple),var(--pink));
background-size:400% 400%;
filter:blur(12px);
animation:led 10s linear infinite;
z-index:-1;
}

.card:after{
content:"";
position:absolute;
inset:1px;
border-radius:27px;
background:linear-gradient(180deg,rgba(15,15,15,.98),rgba(5,5,5,.98));
z-index:-1;
}

@keyframes led{
0%{background-position:0 50%}
50%{background-position:100% 50%}
100%{background-position:0 50%}
}

.banner{
height:190px;
background:var(--banner) center/cover;
position:relative;
}

.banner:after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to bottom,transparent,rgba(0,0,0,.8));
}

.pfp{
width:120px;
height:120px;
margin:-60px auto 0;
border-radius:50%;
background:var(--pfp) center/cover;
border:2px solid rgba(255,255,255,.08);
box-shadow:0 0 25px rgba(255,95,210,.3);
}

.content{
padding:30px 35px 35px;
text-align:center;
}

h1{
font-size:32px;
letter-spacing:4px;
margin-top:12px;
}

.bio{
margin-top:16px;
font-size:14px;
line-height:2;
color:#b8b8b8;
}

.links{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:30px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:15px;
border-radius:16px;
text-decoration:none;
color:#fff;
font-size:13px;
font-weight:600;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
transition:.25s;
}

.btn:hover{
transform:translateY(-4px);
border-color:rgba(255,95,210,.35);
}

.btn img{
width:22px;
height:22px;
object-fit:contain;
}

@media(max-width:900px){
body{
justify-content:center;
padding:20px;
}
body::after{display:none}
}

@media(max-width:500px){
.card{width:100%}
.links{grid-template-columns:1fr}
}
</style>
</head>
