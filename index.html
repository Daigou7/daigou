<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daigou</title>

<link rel="icon" type="image/png" href="https://i.imgur.com/sx5COrj.png">

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

:root{

--bg:url('https://i.imgur.com/ZlY9VEs.png');
--banner:url('https://i.imgur.com/gmyRB35.png');
--pfp:url('https://i.imgur.com/NkAbsLy.png');

--pink:#ff5fd2;
--purple:#9d6bff;
--cyan:#69e8ff;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#000;
min-height:100vh;

display:flex;
align-items:center;
justify-content:flex-start;

padding-left:8vw;

overflow-x:hidden;
color:#fff;
position:relative;
}

body::after{
content:'';

position:fixed;

right:60px;
bottom:25px;

width:260px;
height:260px;

background:url('https://media.tenor.com/3iZPSvYxecMAAAAj/mita-chibi-mita.gif')
center/contain no-repeat;

pointer-events:none;

opacity:.95;

z-index:5;
}

.card{

width:470px;

background:
linear-gradient(
180deg,
rgba(18,18,18,.98),
rgba(6,6,6,.98)
);

border-radius:28px;

overflow:hidden;
position:relative;

border:1px solid rgba(255,255,255,.05);

backdrop-filter:blur(20px);

box-shadow:
0 0 50px rgba(0,0,0,.85),
0 0 25px rgba(255,95,210,.08);

}

.card::before{

content:'';

position:absolute;
inset:-2px;

background:
linear-gradient(
135deg,
var(--pink),
var(--cyan),
var(--purple),
var(--pink)
);

background-size:400% 400%;

filter:blur(12px);

animation:led 10s linear infinite;

z-index:-1;
}

.card::after{

content:'';

position:absolute;
inset:1px;

background:
linear-gradient(
180deg,
rgba(15,15,15,.98),
rgba(5,5,5,.98)
);

border-radius:27px;

z-index:-1;
}

@keyframes led{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.banner{
height:190px;
background:var(--banner) center/cover;
position:relative;
}

.banner::after{

content:'';

position:absolute;
inset:0;

background:
linear-gradient(
to bottom,
transparent,
rgba(0,0,0,.8)
);

}

.pfp{

width:120px;
height:120px;

border-radius:50%;

background:var(--pfp) center/cover;

border:2px solid rgba(255,255,255,.08);

margin:-60px auto 0;

position:relative;

box-shadow:
0 0 25px rgba(255,95,210,.3),
0 0 50px rgba(105,232,255,.15);

}

.content{
padding:30px 35px 35px;
text-align:center;
}

h1{

font-size:32px;
font-weight:700;

letter-spacing:4px;
text-transform:uppercase;

margin-top:12px;

}

.bio{

margin-top:16px;

font-size:14px;
line-height:2;

color:#b8b8b8;

}

.links{

display:grid;
grid-template-columns:1fr 1fr;

gap:12px;

margin-top:30px;

}

.btn{

display:flex;
align-items:center;
justify-content:center;
gap:10px;

padding:15px;

text-decoration:none;
color:#fff;

background:
linear-gradient(
180deg,
rgba(255,255,255,.05),
rgba(255,255,255,.02)
);

border:1px solid rgba(255,255,255,.06);

border-radius:16px;

font-size:13px;
font-weight:600;

transition:.25s ease;

backdrop-filter:blur(10px);

}

.btn:hover{

transform:
translateY(-4px)
scale(1.02);

border-color:rgba(255,95,210,.35);

box-shadow:
0 0 18px rgba(255,95,210,.18),
0 0 30px rgba(105,232,255,.12);

background:
linear-gradient(
180deg,
rgba(255,95,210,.08),
rgba(105,232,255,.05)
);

}

.btn img{

width:22px;
height:22px;

object-fit:contain;

filter:
drop-shadow(0 0 5px rgba(255,255,255,.15));

}

@media(max-width:900px){

body{

justify-content:center;

padding-left:20px;
padding-right:20px;

}

body::after{
display:none;
}

}

@media(max-width:500px){

.card{
width:100%;
}

.links{
grid-template-columns:1fr;
}

}

</style>

</head>
<body>

<video autoplay muted loop playsinline id="bg-video">
    <source src="https://i.imgur.com/n7vSArX.mp4" type="video/mp4">
</video>
  
<div class="card">

<div class="banner"></div>

<div class="pfp"></div>

<div class="content">

<h1>DAIGOU</h1>

<div class="bio">
Jesus Christ is Lord ♱<br>
Buy Bitcoin ₿
</div>

<div class="links">

<a class="btn"
href="https://www.blockchain.com/explorer/addresses/btc/bc1qxy0uvk6n9fu7nv9a93ljax8q77vl649pmsh8ws"
target="_blank">

<img src="https://i.imgur.com/dvR0GB6.png" alt="">
<span>Bitcoin</span>

</a>

<a class="btn"
href="https://steamcommunity.com/id/Daigou7/"
target="_blank">

<img src="https://i.imgur.com/N92w6JN.png" alt="">
<span>Steam</span>

</a>

<a class="btn"
href="https://myanimelist.net/profile/daigou"
target="_blank">

<img src="https://i.imgur.com/jWbk2Ey.png" alt="">
<span>MyAnimeList</span>

</a>

<a class="btn"
href="https://www.youtube.com/channel/UCKIoTYVZy8u9D4nKORJ8NiA"
target="_blank">

<img src="https://static.vecteezy.com/system/resources/thumbnails/018/930/572/small/youtube-logo-youtube-icon-transparent-free-png" alt="">
<span>YouTube</span>

</a>

</div>

</div>

</div>

</body>
</html>
