<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>daigou</title>
  <link rel="icon" type="image/gif" href="https://files.catbox.moe/7poccf.gif">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap');

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#000;
      color:white;
      font-family:'Orbitron', sans-serif;
      min-height:100vh;
      overflow-x:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px 20px;
      position:relative;
    }

    /* imagem fixa fundo */
    .bg-image{
      position:fixed;
      right:0;
      bottom:0;
      width:650px;
      opacity:0.22;
      pointer-events:none;
      z-index:0;
      filter:drop-shadow(0 0 20px #ff00ff66);
    }

    /* card */
    .card{
      width:430px;
      background:#050505;
      border-radius:24px;
      position:relative;
      overflow:hidden;
      z-index:2;
      box-shadow:
      0 0 25px rgba(255,0,255,0.15),
      0 0 60px rgba(128,0,255,0.15);
    }

    /* borda led */
    .card::before{
      content:'';
      position:absolute;
      inset:-2px;
      background:linear-gradient(
      45deg,
      #ff00c8,
      #8a2eff,
      #ff00c8,
      #8a2eff
      );
      background-size:400%;
      border-radius:24px;
      z-index:-2;
      animation:borderGlow 8s linear infinite;
    }

    .card::after{
      content:'';
      position:absolute;
      inset:2px;
      background:#050505;
      border-radius:22px;
      z-index:-1;
    }

    @keyframes borderGlow{
      0%{
        background-position:0 0;
      }
      100%{
        background-position:400% 0;
      }
    }

    /* banner */
    .banner{
      width:100%;
      height:160px;
      background:url('https://i.imgur.com/m09Loed.png') center/cover;
      position:relative;
    }

    /* profile */
    .profile-container{
      width:100%;
      display:flex;
      justify-content:center;
      margin-top:-55px;
      position:relative;
      z-index:5;
    }

    .profile{
      width:110px;
      height:110px;
      border-radius:50%;
      border:4px solid #000;
      object-fit:cover;
      box-shadow:
      0 0 15px #ff00ff88,
      0 0 35px #8000ff88;
    }

    .content{
      padding:20px 30px 35px;
      text-align:center;
    }

    h1{
      margin-top:10px;
      font-size:34px;
      letter-spacing:4px;
      color:#fff;
      text-shadow:
      0 0 8px #ff00ff,
      0 0 18px #8000ff;
    }

    .bio{
      margin-top:14px;
      color:#cfcfcf;
      line-height:1.8;
      font-size:14px;
      text-shadow:0 0 10px rgba(255,255,255,0.08);
    }

    .buttons{
      margin-top:30px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .btn{
      width:100%;
      text-decoration:none;
      color:white;
      background:#0d0d0d;
      border:1px solid rgba(255,255,255,0.06);
      border-radius:14px;
      padding:14px 18px;
      display:flex;
      align-items:center;
      gap:14px;
      transition:0.25s;
      position:relative;
      overflow:hidden;
    }

    .btn:hover{
      transform:translateY(-2px);
      border-color:#ff00ff;
      box-shadow:
      0 0 15px rgba(255,0,255,0.35),
      0 0 35px rgba(128,0,255,0.2);
    }

    .btn img{
      width:26px;
      height:26px;
      object-fit:contain;
    }

    .btn span{
      font-size:14px;
      letter-spacing:1px;
    }

    @media(max-width:500px){

      .card{
        width:100%;
      }

      .bg-image{
        width:420px;
      }

      h1{
        font-size:28px;
      }
    }

  </style>
</head>
<body>

  <!-- imagem fundo -->
  <img class="bg-image" src="https://i.imgur.com/LF9bc6z.png">

  <div class="card">

    <!-- banner -->
    <div class="banner"></div>

    <!-- pfp -->
    <div class="profile-container">
      <img
        class="profile"
        src="https://i.imgur.com/amgLaXX.png"
      >
    </div>

    <div class="content">

      <h1>DAIGOU</h1>

      <div class="bio">
        Jᴇsᴜs Cʜʀɪsᴛ is Lord ♱<br>
        Buy Bitcoin ₿
      </div>

      <div class="buttons">

        <a class="btn" href="https://www.blockchain.com/explorer/addresses/btc/bc1qxy0uvk6n9fu7nv9a93ljax8q77vl649pmsh8ws" target="_blank">
          <img src="https://i.imgur.com/dvR0GB6.png">
          <span>Bitcoin</span>
        </a>

        <a class="btn" href="https://steamcommunity.com/id/Daigou7/" target="_blank">
          <img src="https://i.imgur.com/N92w6JN.png">
          <span>Steam</span>
        </a>

        <a class="btn" href="https://myanimelist.net/profile/daigou" target="_blank">
          <img src="https://i.imgur.com/jWbk2Ey.png">
          <span>MAL</span>
        </a>

      </div>

    </div>

  </div>

</body>
</html>
