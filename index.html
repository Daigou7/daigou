<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>daigou</title>

  <!-- favicon -->
  <link rel="icon" type="image/gif" href="https://files.catbox.moe/7poccf.gif">

  <style>

    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap');

    /* ======================================= */
    /* CONFIGURAÇÕES RÁPIDAS                   */
    /* ======================================= */

    :root{

      /* cores */
      --main-bg: #000000;
      --card-bg: #050505;

      --pink: #ff00c8;
      --purple: #8a2eff;

      --text: #ffffff;
      --subtext: #cfcfcf;

      /* imagens */
      --bg-image: url('https://i.imgur.com/LF9bc6z.png');

      --banner-image: url('https://i.imgur.com/m09Loed.png');

      /* tamanhos */
      --card-width: 430px;
      --profile-size: 110px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:var(--main-bg);
      color:var(--text);
      font-family:'Orbitron', sans-serif;

      min-height:100vh;

      overflow-x:hidden;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:40px 20px;

      position:relative;
    }

    /* ======================================= */
    /* IMAGEM FIXA DO FUNDO                    */
    /* ======================================= */

    .bg-image{

      position:fixed;

      right:0;
      bottom:0;

      width:650px;

      opacity:0.22;

      pointer-events:none;

      z-index:0;

      filter:drop-shadow(0 0 20px #ff00ff66);
    }

    /* ======================================= */
    /* CARD                                    */
    /* ======================================= */

    .card{

      width:var(--card-width);

      background:var(--card-bg);

      border-radius:24px;

      position:relative;

      overflow:hidden;

      z-index:2;

      box-shadow:
      0 0 25px rgba(255,0,255,0.15),
      0 0 60px rgba(128,0,255,0.15);

      backdrop-filter:blur(8px);
    }

    /* borda led */

    .card::before{

      content:'';

      position:absolute;

      inset:-2px;

      background:
      linear-gradient(
      45deg,
      var(--pink),
      var(--purple),
      var(--pink),
      var(--purple)
      );

      background-size:400%;

      border-radius:24px;

      z-index:-2;

      animation:borderGlow 8s linear infinite;
    }

    .card::after{

      content:'';

      position:absolute;

      inset:2px;

      background:var(--card-bg);

      border-radius:22px;

      z-index:-1;
    }

    @keyframes borderGlow{

      0%{
        background-position:0 0;
      }

      100%{
        background-position:400% 0;
      }
    }

    /* ======================================= */
    /* BANNER                                  */
    /* ======================================= */

    .banner{

      width:100%;

      height:160px;

      background:var(--banner-image) center/cover;

      position:relative;
    }

    /* ======================================= */
    /* PROFILE PICTURE                         */
    /* ======================================= */

    .profile-container{

      width:100%;

      display:flex;

      justify-content:center;

      margin-top:-55px;

      position:relative;

      z-index:5;
    }

    .profile{

      width:var(--profile-size);
      height:var(--profile-size);

      border-radius:50%;

      border:4px solid #000;

      object-fit:cover;

      box-shadow:
      0 0 15px #ff00ff88,
      0 0 35px #8000ff88;

      transition:0.3s;
    }

    .profile:hover{

      transform:scale(1.05);

      box-shadow:
      0 0 25px #ff00ffcc,
      0 0 45px #8000ffcc;
    }

    /* ======================================= */
    /* CONTEÚDO                                */
    /* ======================================= */

    .content{

      padding:20px 30px 35px;

      text-align:center;
    }

    h1{

      margin-top:10px;

      font-size:34px;

      letter-spacing:4px;

      color:var(--text);

      text-shadow:
      0 0 8px var(--pink),
      0 0 18px var(--purple);
    }

    .bio{

      margin-top:14px;

      color:var(--subtext);

      line-height:1.8;

      font-size:14px;

      text-shadow:
      0 0 10px rgba(255,255,255,0.08);
    }

    /* ======================================= */
    /* BOTÕES                                  */
    /* ======================================= */

    .buttons{

      margin-top:30px;

      display:grid;

      grid-template-columns:1fr 1fr;

      gap:14px;
    }

    /* MAL centralizado embaixo */

    .buttons a:nth-child(3){

      grid-column:1 / 3;

      width:50%;

      margin:auto;
    }

    .btn{

      width:100%;

      text-decoration:none;

      color:white;

      background:#0d0d0d;

      border:
      1px solid rgba(255,255,255,0.06);

      border-radius:14px;

      padding:14px 18px;

      display:flex;

      align-items:center;

      justify-content:center;

      gap:14px;

      transition:0.25s;

      position:relative;

      overflow:hidden;
    }

    .btn:hover{

      transform:translateY(-2px);

      border-color:var(--pink);

      box-shadow:
      0 0 15px rgba(255,0,255,0.35),
      0 0 35px rgba(128,0,255,0.2);
    }

    .btn img{

      width:26px;
      height:26px;

      object-fit:contain;
    }

    .btn span{

      font-size:14px;

      letter-spacing:1px;
    }

    /* ======================================= */
    /* RESPONSIVO                              */
    /* ======================================= */

    @media(max-width:500px){

      .card{
        width:100%;
      }

      .bg-image{
        width:420px;
      }

      h1{
        font-size:28px;
      }

      .buttons{

        grid-template-columns:1fr;
      }

      .buttons a:nth-child(3){

        grid-column:auto;

        width:100%;
      }
    }

  </style>

</head>

<body>

  <!-- imagem fixa fundo -->
  <img
    class="bg-image"
    src="https://i.imgur.com/LF9bc6z.png"
  >

  <!-- card -->
  <div class="card">

    <!-- banner -->
    <div class="banner"></div>

    <!-- profile picture -->
    <div class="profile-container">

      <img
        class="profile"
        src="https://i.imgur.com/amgLaXX.png"
      >

    </div>

    <!-- conteúdo -->
    <div class="content">

      <h1>DAIGOU</h1>

      <div class="bio">

        Jᴇsᴜs Cʜʀɪsᴛ is Lord ♱
        <br>
        Buy Bitcoin ₿

      </div>

      <!-- botões -->
      <div class="buttons">

        <!-- bitcoin -->
        <a
          class="btn"
          href="https://www.blockchain.com/explorer/addresses/btc/bc1qxy0uvk6n9fu7nv9a93ljax8q77vl649pmsh8ws"
          target="_blank"
        >

          <img src="https://i.imgur.com/dvR0GB6.png">

          <span>Bitcoin</span>

        </a>

        <!-- steam -->
        <a
          class="btn"
          href="https://steamcommunity.com/id/Daigou7/"
          target="_blank"
        >

          <img src="https://i.imgur.com/N92w6JN.png">

          <span>Steam</span>

        </a>

        <!-- MAL -->
        <a
          class="btn"
          href="https://myanimelist.net/profile/daigou"
          target="_blank"
        >

          <img src="https://i.imgur.com/jWbk2Ey.png">

          <span>MAL</span>

        </a>

      </div>

    </div>

  </div>

</body>
</html>
