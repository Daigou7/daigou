<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daigou</title>
<link rel="icon" href="https://i.imgur.com/sx5COrj.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{
min-height:100vh;
display:flex;
align-items:center;
padding-left:8vw;
background:#000;
color:#fff;
overflow:hidden;
}
video.bg{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
z-index:-1;
}
.chibi{
position:fixed;
right:60px;
bottom:25px;
width:260px;
pointer-events:none;
}
.card{
width:470px;
border-radius:28px;
overflow:hidden;
background:#0b0b0b;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 0 50px rgba(0,0,0,.8);
}
.banner{
height:190px;
background:url('https://i.imgur.com/gmyRB35.png') center/cover;
}
.pfp{
width:120px;height:120px;
margin:-60px auto 0;
border-radius:50%;
background:url('https://i.imgur.com/NkAbsLy.png') center/cover;
border:3px solid #111;
}
.content{padding:30px;text-align:center}
h1{letter-spacing:4px;font-size:32px}
.bio{margin:18px 0;color:#bbb;line-height:2}
.links{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:24px;
}
.btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:15px;
border-radius:14px;
background:#141414;
border:1px solid rgba(255,255,255,.06);
text-decoration:none;
color:#fff;
font-weight:600;
}
.btn img{width:22px;height:22px;object-fit:contain}
@media(max-width:900px){
body{justify-content:center;padding:20px}
.chibi{display:none}
}
@media(max-width:500px){
.card{width:100%}
.links{grid-template-columns:1fr}
}
</style>
</head>
<body>

<video class="bg" autoplay muted loop playsinline>
<source src="https://i.imgur.com/n7vSArX.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<img class="chibi" src="https://media.tenor.com/3iZPSvYxecMAAAAj/mita-chibi-mita.gif" alt="">

<div class="card">
<div class="banner"></div>
<div class="pfp"></div>

<div class="content">
<h1>DAIGOU</h1>

<div class="bio">
Jesus Christ is Lord ♱<br>
Buy Bitcoin ₿
</div>

<div class="links">
<a class="btn" href="https://www.blockchain.com/explorer/addresses/btc/bc1qxy0uvk6n9fu7nv9a93ljax8q77vl649pmsh8ws" target="_blank">
<img src="https://i.imgur.com/dvR0GB6.png"><span>Bitcoin</span></a>

<a class="btn" href="https://steamcommunity.com/id/Daigou7/" target="_blank">
<img src="https://i.imgur.com/N92w6JN.png"><span>Steam</span></a>

<a class="btn" href="https://myanimelist.net/profile/daigou" target="_blank">
<img src="https://i.imgur.com/jWbk2Ey.png"><span>MyAnimeList</span></a>

<a class="btn" href="https://www.youtube.com/channel/UCKIoTYVZy8u9D4nKORJ8NiA" target="_blank">
<img src="https://i.imgur.com/IjfFP1r.png"><span>YouTube</span></a>
</div>
</div>
</div>

</body>
</html>
