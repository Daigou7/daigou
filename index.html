<!DOCTYPE html>

<head>

<meta charset="UTF-8">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#000;
color:#fff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(rgba(255,170,230,.03) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,170,230,.03) 1px,transparent 1px);
background-size:42px 42px;
mask-image:radial-gradient(circle at center,black 35%,transparent 95%);
pointer-events:none;
}

body::after{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 50% 50%,rgba(255,160,220,.05),transparent 45%),
radial-gradient(circle at top left,rgba(255,160,220,.08),transparent 35%),
radial-gradient(circle at bottom right,rgba(255,160,220,.08),transparent 35%);
pointer-events:none;
}

.container{
width:420px;
max-width:90%;
text-align:center;
padding:40px;
background:rgba(8,8,8,.92);
border:1px solid rgba(255,170,230,.12);
border-radius:24px;
backdrop-filter:blur(14px);
box-shadow:
0 0 25px rgba(255,170,230,.05),
0 0 80px rgba(0,0,0,.95);
position:relative;
}

.container::before{
content:"";
position:absolute;
left:50%;
top:0;
transform:translateX(-50%);
width:140px;
height:2px;
background:#ff9adf;
box-shadow:0 0 15px #ff9adf;
}

h1{
font-size:36px;
font-weight:700;
letter-spacing:6px;
margin-bottom:18px;
text-shadow:0 0 10px rgba(255,170,230,.25);
}

.bio{
color:#9f9f9f;
line-height:2;
margin-bottom:30px;
font-size:15px;
}

.links{
display:flex;
flex-direction:column;
gap:14px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
padding:16px;
background:#111;
border:1px solid rgba(255,170,230,.08);
border-radius:14px;
text-decoration:none;
color:#fff;
font-weight:600;
transition:.25s;
}

.btn:hover{
transform:translateY(-2px);
background:#161616;
border-color:#ff9adf;
box-shadow:
0 0 14px rgba(255,170,230,.18),
0 0 35px rgba(255,170,230,.08);
}

.btn img{
width:22px;
height:22px;
filter:drop-shadow(0 0 4px rgba(255,170,230,.4));
}

</style>

</head>

<body>

</div>
